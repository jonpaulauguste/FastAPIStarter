services:
  - type: web
    name: campus-eats
    runtime: python
    buildCommand: pip install -e .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URI
        value: sqlite:///database.db
      - key: SECRET_KEY
        generateValue: true
      - key: ENV
        value: production